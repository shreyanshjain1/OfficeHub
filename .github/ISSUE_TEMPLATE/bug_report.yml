name: Bug report
description: Report a reproducible bug in OfficeHub
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: The request list fails to load after login...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact steps to reproduce the issue
      placeholder: |
        1. Login as admin
        2. Open Requests
        3. Apply filter X
        4. Observe error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected result
      placeholder: Requests should load successfully
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual result
      placeholder: The table stays empty / API returns an error
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: XAMPP / cPanel / PHP 8.2 / MySQL 8